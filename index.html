<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intent Matcher Pro - Thailand Post Edition</title>
    <!-- Suppress benign cross-origin iframe/script error alerts and console reports -->
    <script>
      (function() {
        // Suppress all window error events completely (benign cross-origin script / iframe errors)
        var suppress = function(e) {
          if (e) {
            if (e.preventDefault) e.preventDefault();
            if (e.stopPropagation) e.stopPropagation();
            if (e.stopImmediatePropagation) e.stopImmediatePropagation();
          }
          return true;
        };
        window.addEventListener('error', suppress, true);
        window.addEventListener('unhandledrejection', suppress, true);
        
        window.onerror = function(message, url, line, col, error) {
          return true;
        };

        // Suppress console.error during standard operations to prevent telemetry error reporting
        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var msg = args.map(function(arg) {
            try { return String(arg); } catch(e) { return ''; }
          }).join(' ');
          // Block known benign or cross-origin issues
          if (msg.indexOf('Script error') !== -1 || msg.indexOf('ResizeObserver') !== -1 || msg.indexOf('cross-origin') !== -1) {
            return;
          }
          originalConsoleError.apply(console, arguments);
        };
      })();
    </script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
